{% extends "base.html" %}
{% load i18n %}

{% block content %}
<h2>{% translate "Мой профиль" %}</h2>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">{% translate "Сохранить" %}</button>
</form>
<hr>
<a href="{% url 'users:password_change' %}" class="btn btn-warning mt-3">
    {% translate "Сменить пароль" %}
</a>
<a href="{% url 'events:my_events_requests' %}" class="btn btn-info mt-3">
    {% translate "Заявки на мои события" %}
</a>
{% endblock %}
