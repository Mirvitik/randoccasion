{% load static %}
<div class="row g-4">
    <div class="col-12 col-md-6 col-lg-4">
        <div class="card h-100 shadow-sm event-card">
            <div class="card-header bg-transparent border-bottom-0 pb-0">
                <div class="d-flex justify-content-between align-items-start">
                    <h5 class="card-title mb-1 text-truncate pe-2" title="{{event.name}}">{{event.name}}</h5>
                    <span class="badge bg-primary rounded-pill flex-shrink-0">Тема</span>
                </div>
            </div>
            <div class="card-body d-flex flex-column">
                <div class="card-text description-content mb-3">
                    {{event.description|safe|truncatewords_html:150}}
                </div>
                <div class="event-info mb-3">
                    <div class="d-flex align-items-center text-muted mb-2">
                        <i class="bi bi-geo-alt me-2"></i>
                        <span class="location-text">🗺️ Место:{{event.location}}</span>
                    </div>
                    <div class="d-flex align-items-center text-muted mb-2">
                        <i class="bi bi-person me-2"></i>
                        <span>Создатель: {{event.creator.username}}</span>
                    </div>
                    <div class="d-flex align-items-center text-muted">
                        <i class="bi bi-clock me-2"></i>
                        <span>Пройдёт через: {{event.expires_after}}</span>
                    </div>
                </div>
                <div class="mt-auto pt-2">
                    <a href="/events/{{event.pk}}/" class="btn btn-primary btn-sm w-100 d-flex align-items-center justify-content-center">
                        Подробнее
                        <i class="bi bi-arrow-right ms-1"></i>
                    </a>
                </div>
            </div>
            <div class="card-footer bg-transparent border-top-0 pt-0">
                <div class="d-flex justify-content-between text-muted small">
                    <span>ID: {{event.pk}}</span>
                    <span>{{event.created_at|date:"d.m.Y"}}</span>
                </div>
            </div>
        </div>
    </div>
</div>
