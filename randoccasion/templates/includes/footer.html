{% load static i18n %}

<div class="container">
    <div class="d-flex flex-wrap justify-content-between align-items-center">
        <div class="mb-2">
            <h6 class="fs-4 mb-0">&copy; {% translate "Встречалки" %}, <span id="year">{% now "Y" %}</span></h6>
        </div>

        <div class="d-flex gap-3 mb-2">
            <a href="{% url 'homepage:privacy' %}" class="text-decoration-none">{% translate "Политика конфиденциальности" %}</a>
            <a href="about-api/" class="text-decoration-none">API</a>
        </div>
    </div>

    <input type="hidden" id="server-time" value="{% now 'Y-m-d' %}T{% now 'H:i:s' %}Z"/>
    <script src="{% static 'js/footer-year.js' %}" defer></script>

    <noscript>
        <div class="server-time-note">
            #year::after {
            content: " (server time)";
            font-size: 0.8em;
            color: #6c757d;
            }
        </div>
    </noscript>
</div>
